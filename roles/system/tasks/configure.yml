---
- name: Set the hostname
  when: domain_name is defined
  become: true
  ansible.builtin.hostname:
    name: "{{ domain_name }}"
- name: Set timezone
  become: true
  community.general.timezone:
    name: "{{ timezone }}"
- name: Remove mail_badpass from sudoers
  ansible.builtin.replace:
    group: root
    mode: "0440"
    owner: root
    path: /etc/sudoers
    regexp: (^Defaults.*mail_badpass$)|(\,mail_badpass)
    replace: ""
    validate: /usr/sbin/visudo -cf %s
  become: true
- name: Adding pwfeedback
  ansible.builtin.copy:
    content: |
      Defaults        pwfeedback
    dest: /etc/sudoers.d/02-pwfeedback
    group: root
    mode: "0440"
    owner: root
    validate: /usr/sbin/visudo -cf %s
  become: true
- name: Configure systemd-journald to persist storage
  ansible.builtin.include_role:
    name: persist_journald
    apply:
      become: true
